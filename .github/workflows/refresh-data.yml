name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * 1-5"   # weekdays 05:45 UTC (07:45 CET / 08:45 CEST) — morning catch-up
    - cron: "30 17 * * 1-5"  # weekdays 17:30 UTC (18:30 CET / 19:30 CEST) — after afternoon voting
    - cron: "0 9 * * 6"      # Saturday 09:00 UTC (10:00 CET / 11:00 CEST) — catch Friday late votes

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh static data
        run: |
          python scripts/fetch_data.py --start-date 2022-11-01

      - name: Install Playwright for R/F document scraping
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Refresh R/F documents
        run: |
          python scripts/fetch_ft_rf_documents.py --headless --verbose
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json catalog.js vote-catalog.js photos/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh parliamentary data"
          git push
